name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Project
        run: |
          xcodebuild clean build \
            -project SmartCampus.xcodeproj \
            -scheme SmartCampus \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./build
      
      - name: Find and Create IPA
        run: |
          echo "Looking for .app file..."
          find ./build -name "*.app" -type d
          
          # Find the .app file and copy to Payload
          APP_PATH=$(find ./build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r SmartCampus.ipa Payload
            echo "IPA created successfully!"
          else
            echo "ERROR: No .app file found"
            exit 1
          fi
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus
          path: SmartCampus.ipa
