name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App
          pod install
          cd ../..
      
      - name: Build with Xcode
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData
          cd ../..
      
      - name: Package IPA
        run: |
          APP_PATH=$(find ios/App/DerivedData -name "App.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r SmartCampus.ipa Payload
            echo "✅ IPA created!"
          else
            echo "❌ App not found"
            exit 1
          fi
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus
          path: SmartCampus.ipa
