name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: List files for debugging
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== ios/App directory ==="
          ls -la ios/App/
          echo "=== Looking for .xcodeproj ==="
          find . -name "*.xcodeproj" -type d
          echo "=== Looking for .xcworkspace ==="
          find . -name "*.xcworkspace" -type d
      
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App
          pod install --verbose
          cd ../..
      
      - name: Build iOS App
        run: |
          # Try workspace first, fall back to project
          if [ -d "ios/App/App.xcworkspace" ]; then
            xcodebuild -workspace ios/App/App.xcworkspace \
              -scheme App \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO \
              -derivedDataPath DerivedData
          elif [ -d "SmartCampus.xcodeproj" ]; then
            xcodebuild -project SmartCampus.xcodeproj \
              -scheme App \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO \
              -derivedDataPath DerivedData
          else
            echo "No project or workspace found!"
            exit 1
          fi
      
      - name: Create IPA
        run: |
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r SmartCampus.ipa Payload
            echo "IPA created successfully!"
          else
            echo "No .app found"
            find DerivedData -name "*.app" -type d
            exit 1
          fi
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus
          path: SmartCampus.ipa
