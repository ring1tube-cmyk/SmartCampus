name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install --repo-update
          cd ../..
      
      - name: Build iOS App
        run: |
          xcodebuild -project SmartCampus.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData
      
      - name: Create IPA
        run: |
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -1)
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r SmartCampus.ipa Payload
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus
          path: SmartCampus.ipa
