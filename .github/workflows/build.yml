name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm ci
          mkdir -p www
          echo '<script></script>' > www/index.html

      - name: Force Clean Native iOS Generation
        run: |
          rm -rf ios
          npx cap add ios

      - name: Build iOS Workspace
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphonesimulator \
                     -configuration Debug \
                     clean build \
                     CODE_SIGNING_ALLOWED=NO
                     - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus-Simulator-App
          path: ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Debug-iphonesimulator/*.app