name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: List files for debugging
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== ios/App directory ==="
          ls -la ios/App/
          echo "=== Looking for Podfile ==="
          find . -name "Podfile"
      
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App
          pod install --verbose
          ls -la
          cd ../..
      
      - name: Build iOS App
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData
      
      - name: Create IPA
        run: |
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r SmartCampus.ipa Payload
            echo "IPA created successfully!"
          else
            echo "No .app found, checking build folder..."
            find DerivedData -name "*.app" -type d
            exit 1
          fi
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus
          path: SmartCampus.ipa
