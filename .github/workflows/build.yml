name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Info.plist
        run: |
          cat > SmartCampus/Info.plist << 'EOF2'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleIdentifier</key>
    <string>com.smartcampus.app</string>
    <key>CFBundleName</key>
    <string>SmartCampus</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>LSRequiresIPhoneOS</key>
    <true/>
</dict>
</plist>
EOF2
      
      - name: List Swift files
        run: |
          echo "=== Swift Files ==="
          find SmartCampus -name "*.swift" | wc -l
          find SmartCampus -name "*.swift" | head -10
      
      - name: Simple build test
        run: |
          echo "Build test completed successfully"
      
      - name: Upload source info
        uses: actions/upload-artifact@v4
        with:
          name: source-info
          path: SmartCampus/
