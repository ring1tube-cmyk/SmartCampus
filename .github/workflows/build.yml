name: Test Files

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List Swift files
        run: |
          echo "=== Swift Files Count ==="
          find SmartCampus -name "*.swift" | wc -l
          echo "=== First 10 Swift Files ==="
          find SmartCampus -name "*.swift" | head -10
