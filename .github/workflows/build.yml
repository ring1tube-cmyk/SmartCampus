name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with xcodebuild
        run: |
          xcodebuild -project SmartCampus.xcodeproj \
            -scheme SmartCampus \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData
      
      - name: Create IPA
        run: |
          APP_PATH=$(find DerivedData -name "SmartCampus.app" -type d | head -1)
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r SmartCampus.ipa Payload
            echo "IPA created successfully!"
          else
            echo "ERROR: No .app file found"
            exit 1
          fi
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus
          path: SmartCampus.ipa
