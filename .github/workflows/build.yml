name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build iOS App (No Pods)
        run: |
          # Use xcodebuild directly without pod install
          xcodebuild -project SmartCampus.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath DerivedData \
            SKIP_INSTALL=NO \
            ONLY_ACTIVE_ARCH=NO \
            VALID_ARCHS="arm64 armv7"
          
      - name: Find and Create IPA
        run: |
          echo "Searching for .app file..."
          find DerivedData -name "*.app" -type d
          
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r SmartCampus.ipa Payload
            echo "IPA created: $(ls -la SmartCampus.ipa)"
          else
            echo "ERROR: No .app file found"
            exit 1
          fi
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartCampus
          path: SmartCampus.ipa
